<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
    <title>个人助理</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --primary: #6C63FF;
            --primary-light: #8B7BFF;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* 毛玻璃效果基础类 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.8), rgba(139, 123, 255, 0.8));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        .glass-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .glass-button:active {
            transform: translateY(0);
        }

        .glass-button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: var(--text-primary);
            font-size: 16px;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .glass-input::placeholder {
            color: var(--text-muted);
        }

        /* 头部 */
        .header {
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 100%);
            backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-date {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px 24px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--primary-light);
            background: rgba(108, 99, 255, 0.15);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 500;
        }

        /* 页面容器 */
        .page {
            display: none;
            padding: 0 16px 100px;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 16px 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-light);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 习惯项 */
        .habit-item {
            display: flex;
            align-items: center;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .habit-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .habit-item.completed .habit-icon {
            background: linear-gradient(135deg, var(--success), #34D399);
        }

        .habit-info {
            flex: 1;
        }

        .habit-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .habit-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .habit-check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .habit-item.completed .habit-check {
            background: var(--success);
            border-color: var(--success);
        }

        .habit-check svg {
            width: 16px;
            height: 16px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .habit-item.completed .habit-check svg {
            opacity: 1;
        }

        /* 添加按钮 */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(108, 99, 255, 0.5);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        /* 鼓励弹窗特殊样式 */
        .encouragement-modal {
            text-align: center;
        }

        .encouragement-emoji {
            font-size: 64px;
            margin-bottom: 16px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .encouragement-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .encouragement-subtext {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* 列表项 */
        .list-item {
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .list-item-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 复选框 */
        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(108, 99, 255, 0.2);
            color: var(--primary-light);
            margin-right: 6px;
        }

        /* 训练计时器 */
        .timer-display {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        /* 动作详解 */
        .exercise-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .exercise-detail.show {
            max-height: 500px;
        }

        .exercise-detail-content {
            padding: 16px;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 视频卡片 */
        .video-card {
            padding: 0;
            overflow: hidden;
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.3), rgba(15, 52, 96, 0.5));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-platform {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* 删除按钮 */
        .delete-btn {
            color: var(--danger);
            padding: 8px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        /* 组间休息提示 */
        .rest-timer-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.9), rgba(251, 191, 36, 0.9));
            backdrop-filter: blur(20px);
            z-index: 1500;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .rest-timer-banner.show {
            display: flex;
        }

        .rest-timer-text {
            font-weight: 600;
            color: #1a1a2e;
        }

        .rest-timer-time {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <!-- 组间休息计时器横幅 -->
    <div class="rest-timer-banner" id="restTimerBanner">
        <span class="rest-timer-text">⏱️ 组间休息中</span>
        <span class="rest-timer-time" id="restTimerDisplay">00:00</span>
    </div>

    <!-- 头部 -->
    <header class="header">
        <h1>个人助理</h1>
        <div class="header-date" id="currentDate"></div>
    </header>

    <!-- 页面内容 -->
    <main>
        <!-- 习惯打卡页面 -->
        <div class="page active" id="page-habits">
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-value" id="habitCompleted">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="habitTotal">0</div>
                    <div class="stat-label">总习惯</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="habitStreak">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
            </div>
            <div id="habitsList"></div>
        </div>

        <!-- 训练记录页面 -->
        <div class="page" id="page-workout">
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-value" id="workoutCount">0</div>
                    <div class="stat-label">本周训练</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="totalVolume">0</div>
                    <div class="stat-label">总容量(kg)</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="totalSets">0</div>
                    <div class="stat-label">总组数</div>
                </div>
            </div>
            <div id="workoutsList"></div>
        </div>

        <!-- 灵感捕捉页面 -->
        <div class="page" id="page-ideas">
            <div class="glass-card" style="padding: 16px; margin-bottom: 20px;">
                <textarea class="glass-input" id="ideaInput" rows="3" placeholder="有什么想法？立即记录下来..."></textarea>
                <button class="glass-button" style="width: 100%; margin-top: 12px;" onclick="addIdea()">记录灵感</button>
            </div>
            <div id="ideasList"></div>
        </div>

        <!-- 稍后再看页面 -->
        <div class="page" id="page-videos">
            <div class="glass-card" style="padding: 16px; margin-bottom: 20px;">
                <input type="text" class="glass-input" id="videoUrlInput" placeholder="粘贴短视频链接 (抖音/B站/YouTube...)">
                <button class="glass-button" style="width: 100%; margin-top: 12px;" onclick="addVideo()">添加视频</button>
            </div>
            <div id="videosList"></div>
        </div>
    </main>

    <!-- 添加习惯按钮 -->
    <button class="fab glass" id="fabBtn" onclick="showAddHabitModal()">+</button>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('habits')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span>习惯</span>
        </div>
        <div class="nav-item" onclick="switchPage('workout')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6.5 6.5l11 11M21 21l-1-1M3 3l1 1M18 22l4-4M2 6l4-4"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span>训练</span>
        </div>
        <div class="nav-item" onclick="switchPage('ideas')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <span>灵感</span>
        </div>
        <div class="nav-item" onclick="switchPage('videos')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2.18"/>
                <path d="M10 8l6 4-6 4V8z"/>
            </svg>
            <span>视频</span>
        </div>
    </nav>

    <!-- 添加习惯弹窗 -->
    <div class="modal-overlay" id="addHabitModal">
        <div class="modal glass-card">
            <div class="modal-title">添加新习惯</div>
            <input type="text" class="glass-input" id="habitNameInput" placeholder="习惯名称">
            <div style="margin-top: 16px;">
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">选择图标</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="glass-button secondary" onclick="selectIcon('💧')" style="padding: 12px;">💧</button>
                    <button class="glass-button secondary" onclick="selectIcon('📚')" style="padding: 12px;">📚</button>
                    <button class="glass-button secondary" onclick="selectIcon('🏃')" style="padding: 12px;">🏃</button>
                    <button class="glass-button secondary" onclick="selectIcon('😴')" style="padding: 12px;">😴</button>
                    <button class="glass-button secondary" onclick="selectIcon('🧘')" style="padding: 12px;">🧘</button>
                    <button class="glass-button secondary" onclick="selectIcon('⭐')" style="padding: 12px;">⭐</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="glass-button secondary" onclick="hideModal('addHabitModal')">取消</button>
                <button class="glass-button" onclick="addHabit()">添加</button>
            </div>
        </div>
    </div>

    <!-- 鼓励弹窗 -->
    <div class="modal-overlay" id="encouragementModal">
        <div class="modal glass-card encouragement-modal">
            <div class="encouragement-emoji" id="encouragementEmoji">🎉</div>
            <div class="encouragement-text" id="encouragementText">太棒了！</div>
            <div class="encouragement-subtext" id="encouragementSubtext">继续保持这个好习惯</div>
            <button class="glass-button" onclick="hideEncouragementModal()" style="width: 100%;">好的 👍</button>
        </div>
    </div>

    <!-- 添加训练弹窗 -->
    <div class="modal-overlay" id="addWorkoutModal">
        <div class="modal glass-card" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-title">新建训练</div>
            <div id="workoutExercises"></div>
            <div style="margin-top: 16px;">
                <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">添加动作</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="glass-button secondary" onclick="addExercise('深蹲')" style="padding: 8px 16px; font-size: 14px;">深蹲</button>
                    <button class="glass-button secondary" onclick="addExercise('硬拉')" style="padding: 8px 16px; font-size: 14px;">硬拉</button>
                    <button class="glass-button secondary" onclick="addExercise('卧推')" style="padding: 8px 16px; font-size: 14px;">卧推</button>
                    <button class="glass-button secondary" onclick="addExercise('推举')" style="padding: 8px 16px; font-size: 14px;">推举</button>
                    <button class="glass-button secondary" onclick="addExercise('引体向上')" style="padding: 8px 16px; font-size: 14px;">引体向上</button>
                    <button class="glass-button secondary" onclick="addExercise('划船')" style="padding: 8px 16px; font-size: 14px;">划船</button>
                    <button class="glass-button secondary" onclick="addExercise('弯举')" style="padding: 8px 16px; font-size: 14px;">弯举</button>
                    <button class="glass-button secondary" onclick="addExercise('臂屈伸')" style="padding: 8px 16px; font-size: 14px;">臂屈伸</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="glass-button secondary" onclick="hideModal('addWorkoutModal')">取消</button>
                <button class="glass-button" onclick="saveWorkout()">保存训练</button>
            </div>
        </div>
    </div>

    <script>
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
